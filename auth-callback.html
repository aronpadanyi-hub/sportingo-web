<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés... | Sportingo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #0a1628; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { text-align: center; color: white; padding: 20px; }
    .spinner { width: 44px; height: 44px; border: 3px solid rgba(255,255,255,.2); border-top-color: #2dbf7e; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: .95rem; color: rgba(255,255,255,.65); margin-top: 8px; }
    .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 4px; color: white; margin-bottom: 32px; }
    .logo span { color: #2dbf7e; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">SPORTING<span>O</span></div>
  <div class="spinner"></div>
  <div class="msg" id="msg">Bejelentkezés folyamatban...</div>
</div>
<script>
(function() {
  'use strict';

  var SUPABASE_URL = 'https://amowwfjxeursokkznmxl.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtb3d3Zmp4ZXVyc29ra3pubXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDE4NzQsImV4cCI6MjA4OTkxNzg3NH0.eajpxK96IAF-4XVIv4JALYZ-LqCqXaxU7GIaAE0T5L0';

  // detectSessionInUrl: true → az SDK automatikusan feldolgozza a hash-ben
  // érkező access_token-t (implicit flow). Nincs kézi exchange szükséges.
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { detectSessionInUrl: true }
  });

  var msgEl = document.getElementById('msg');

  function getReturnUrl() {
    try {
      return sessionStorage.getItem('sp_return_to')
          || localStorage.getItem('sp_return_to')
          || 'https://sportingo.hu';
    } catch(e) { return 'https://sportingo.hu'; }
  }

  function clearReturnUrl() {
    try { sessionStorage.removeItem('sp_return_to'); } catch(e) {}
    try { localStorage.removeItem('sp_return_to'); } catch(e) {}
  }

  function doError() {
    msgEl.textContent = 'Hiba történt. Visszairányítás...';
    setTimeout(function() { window.location.replace('https://sportingo.hu'); }, 2500);
  }

  async function handleCallback() {
    var returnUrl = getReturnUrl();

    console.log('[SP AUTH CALLBACK] START', new Date().toISOString());
    console.log('[SP AUTH CALLBACK] hash:', window.location.hash.substring(0, 60));
    console.log('[SP AUTH CALLBACK] search:', window.location.search.substring(0, 60));
    console.log('[SP AUTH CALLBACK] returnUrl:', returnUrl);

    // Az SDK (detectSessionInUrl: true) automatikusan feldolgozza a hash-t.
    // Kis delay kell hogy a belső state beálljon.
    await new Promise(function(r) { setTimeout(r, 300); });

    // Session ellenőrzés – max 10 × 300ms = 3 másodperc
    var session = null;
    for (var i = 0; i < 10; i++) {
      try {
        var res = await sb.auth.getSession();
        if (res.data && res.data.session) {
          session = res.data.session;
          console.log('[SP AUTH CALLBACK] session MEGVAN a ' + i + '. próbánál');
          break;
        }
        console.log('[SP AUTH CALLBACK] ' + i + '/10 – nincs session még');
      } catch(e) {
        console.warn('[SP AUTH CALLBACK] getSession hiba:', e.message);
      }
      await new Promise(function(r) { setTimeout(r, 300); });
    }

    if (!session) {
      console.error('[SP AUTH CALLBACK] 10 próba után nincs session → hiba');
      doError();
      return;
    }

    // [SP AUTH FINAL STATE]
    console.log('[SP AUTH FINAL STATE]',
      'email:', session.user ? session.user.email : '–',
      '| token:', session.access_token ? session.access_token.substring(0, 30) + '…' : '–'
    );

    msgEl.textContent = 'Sikeres bejelentkezés! Visszairányítás...';
    clearReturnUrl();
    window.location.replace(returnUrl);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleCallback);
  } else {
    handleCallback();
  }
})();
</script>
</body>
</html>
