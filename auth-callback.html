<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés... | Sportingo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #0a1628; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { text-align: center; color: white; padding: 20px; }
    .spinner { width: 44px; height: 44px; border: 3px solid rgba(255,255,255,.2); border-top-color: #2dbf7e; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: .95rem; color: rgba(255,255,255,.65); margin-top: 8px; }
    .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 4px; color: white; margin-bottom: 32px; }
    .logo span { color: #2dbf7e; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">SPORTING<span>O</span></div>
  <div class="spinner"></div>
  <div class="msg" id="msg">Bejelentkezés folyamatban...</div>
</div>
<script>
(function() {
  const SUPABASE_URL = 'https://amowwfjxeursokkznmxl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtb3d3Zmp4ZXVyc29ra3pubXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDE4NzQsImV4cCI6MjA4OTkxNzg3NH0.eajpxK96IAF-4XVIv4JALYZ-LqCqXaxU7GIaAE0T5L0';

  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var msgEl = document.getElementById('msg');

  function getReturnUrl() {
    try { return sessionStorage.getItem('sp_return_to') || 'https://sportingo.hu'; }
    catch(e) { return 'https://sportingo.hu'; }
  }

  function doRedirect(url) {
    msgEl.textContent = 'Sikeres bejelentkezés! Visszairányítás...';
    try { sessionStorage.removeItem('sp_return_to'); } catch(e) {}
    // [Safari fix] 700ms → 1500ms: Safari localStorage flush lassabb lehet,
    // a főoldal getSession() csak akkor talál session-t ha a write már kész.
    setTimeout(function() { window.location.replace(url); }, 1500);
  }

  function doError() {
    msgEl.textContent = 'Hiba történt. Visszairányítás a főoldalra...';
    setTimeout(function() { window.location.replace('https://sportingo.hu'); }, 2500);
  }

  // ── DIAGNOSZTIKAI SEGÉDFÜGGVÉNY ─────────────────────────────────────────
  function spDiag(label, value) {
    console.log('%c[SP DIAG] ' + label, 'color:#2dbf7e;font-weight:bold;', value);
  }

  function spDumpStorage() {
    // 1. sessionStorage – ÖSSZES kulcs
    try {
      var ssKeys = Object.keys(sessionStorage);
      spDiag('sessionStorage kulcsok (' + ssKeys.length + ' db)', ssKeys);
      ssKeys.forEach(function(k) {
        var val = sessionStorage.getItem(k);
        spDiag('  sessionStorage["' + k + '"]', val && val.length > 120 ? val.substring(0, 120) + '…' : val);
      });
    } catch(e) { spDiag('sessionStorage OLVASÁSI HIBA', e.message); }

    // 2. localStorage – ÖSSZES kulcs (különös figyelemmel a sb-* és supabase kulcsokra)
    try {
      var lsKeys = Object.keys(localStorage);
      spDiag('localStorage kulcsok (' + lsKeys.length + ' db)', lsKeys);
      lsKeys.forEach(function(k) {
        var val = localStorage.getItem(k);
        spDiag('  localStorage["' + k + '"]', val && val.length > 120 ? val.substring(0, 120) + '…' : val);
      });
    } catch(e) { spDiag('localStorage OLVASÁSI HIBA', e.message); }
  }

  async function handleCallback() {
    var returnUrl = getReturnUrl();

    // ════════════════════════════════════════════════════════
    // DIAGNOSZTIKA 1: URL állapot
    // ════════════════════════════════════════════════════════
    spDiag('--- AUTH CALLBACK START ---', new Date().toISOString());
    spDiag('URL pathname', window.location.pathname);
    spDiag('URL search', window.location.search);
    spDiag('URL hash', window.location.hash ? window.location.hash.substring(0, 80) + '…' : '(üres)');
    spDiag('returnUrl', returnUrl);

    var search = window.location.search;
    var code = new URLSearchParams(search).get('code');
    spDiag('?code param', code ? ('MEGVAN (' + code.length + ' karakter): ' + code.substring(0, 20) + '…') : 'HIÁNYZIK');

    // ════════════════════════════════════════════════════════
    // DIAGNOSZTIKA 2: Storage állapot EXCHANGE ELŐTT
    // ════════════════════════════════════════════════════════
    spDiag('--- STORAGE ÁLLAPOT (exchange ELŐTT) ---', '');
    spDumpStorage();

    // ════════════════════════════════════════════════════════
    // DIAGNOSZTIKA 3: Supabase client állapot EXCHANGE ELŐTT
    // ════════════════════════════════════════════════════════
    try {
      var preCheck = await sb.auth.getSession();
      spDiag('getSession() EXCHANGE ELŐTT', preCheck.data && preCheck.data.session ? 'VAN SESSION (már belépve?)' : 'nincs session');
      if (preCheck.error) spDiag('getSession() pre-check HIBA', preCheck.error);
    } catch(e) { spDiag('getSession() pre-check EXCEPTION', e.message); }

    // ════════════════════════════════════════════════════════
    // 1. PKCE exchange kísérlet
    // ════════════════════════════════════════════════════════
    if (code) {
      spDiag('--- PKCE EXCHANGE KÍSÉRLET ---', '');
      try {
        var result = await sb.auth.exchangeCodeForSession(code);

        // Teljes result objektum kiírása
        spDiag('exchange result.error', result.error ? JSON.stringify(result.error) : 'null (nincs hiba)');
        spDiag('exchange result.data kulcsok', result.data ? Object.keys(result.data) : 'null');
        spDiag('exchange result.data.session', result.data && result.data.session ? 'MEGVAN' : 'null/undefined');
        if (result.data && result.data.session) {
          spDiag('session.user.email', result.data.session.user && result.data.session.user.email);
          spDiag('session.access_token', result.data.session.access_token ? result.data.session.access_token.substring(0, 30) + '…' : 'HIÁNYZIK');
        }

        if (result.error) {
          // Hiba: részletes bontás
          spDiag('EXCHANGE HIBA – message', result.error.message);
          spDiag('EXCHANGE HIBA – status', result.error.status);
          spDiag('EXCHANGE HIBA – code', result.error.code || result.error.__isAuthError);
          spDiag('EXCHANGE HIBA – teljes objekt', JSON.stringify(result.error));
          throw result.error;
        }

        if (result.data && result.data.session) {
          // Storage állapot EXCHANGE UTÁN – ellenőrzés
          spDiag('--- STORAGE ÁLLAPOT (exchange UTÁN, redirect ELŐTT) ---', '');
          spDumpStorage();
          spDiag('EXCHANGE SIKERES → redirect', returnUrl);
          doRedirect(returnUrl);
          return;
        }

        // Nincs hiba de nincs session sem – ritka edge case
        spDiag('EXCHANGE: nincs hiba, nincs session – tovább a fallback-re', '');

      } catch(err) {
        spDiag('EXCHANGE EXCEPTION – message', err && err.message ? err.message : String(err));
        spDiag('EXCHANGE EXCEPTION – name', err && err.name);
        spDiag('EXCHANGE EXCEPTION – status', err && err.status);
        spDiag('EXCHANGE EXCEPTION – teljes', JSON.stringify(err));

        // PKCE verifier állapot részletes vizsgálat
        spDiag('--- PKCE VERIFIER KERESÉS ---', '');
        try {
          var ssKeys2 = Object.keys(sessionStorage);
          var pkceKeys = ssKeys2.filter(function(k) {
            return k.toLowerCase().indexOf('pkce') !== -1 ||
                   k.toLowerCase().indexOf('verifier') !== -1 ||
                   k.toLowerCase().indexOf('supabase') !== -1 ||
                   k.toLowerCase().indexOf('code') !== -1;
          });
          spDiag('PKCE-kapcsolódó sessionStorage kulcsok', pkceKeys.length ? pkceKeys : 'NINCS ILYEN KULCS');
          pkceKeys.forEach(function(k) {
            spDiag('  pkce["' + k + '"]', sessionStorage.getItem(k));
          });
        } catch(se) { spDiag('sessionStorage PKCE keresés HIBA', se.message); }

        msgEl.textContent = 'Hitelesítés folyamatban (fallback)...';
        // Továbblépünk a fallback-re – NEM módosítva
      }
    } else {
      spDiag('NINCS ?code PARAM – implicit flow vagy hibás redirect', '');
    }

    // ════════════════════════════════════════════════════════
    // 2. Implicit flow fallback (változatlan)
    // ════════════════════════════════════════════════════════
    if (window.location.hash && window.location.hash.indexOf('access_token') !== -1) {
      spDiag('Implicit flow: access_token MEGVAN a hash-ben', '');
      await new Promise(function(r) { setTimeout(r, 300); });
    }

    // ════════════════════════════════════════════════════════
    // 3. Fallback getSession() retry loop (VÁLTOZATLAN)
    // ════════════════════════════════════════════════════════
    spDiag('--- FALLBACK getSession() LOOP INDUL ---', '');
    var retries = 0;
    var maxRetries = 25;

    function checkSession() {
      sb.auth.getSession().then(function(res) {
        if (res.data && res.data.session) {
          spDiag('FALLBACK LOOP: session MEGVAN a ' + retries + '. próbánál', '');
          doRedirect(returnUrl);
        } else if (retries < maxRetries) {
          retries++;
          setTimeout(checkSession, 200);
        } else {
          spDiag('FALLBACK LOOP: ' + maxRetries + ' próba után sem volt session → doError()', '');
          spDiag('--- STORAGE ÁLLAPOT (doError előtt) ---', '');
          spDumpStorage();
          doError();
        }
      }).catch(function(e) {
        spDiag('FALLBACK LOOP CATCH hiba', e && e.message ? e.message : String(e));
        if (retries < maxRetries) {
          retries++;
          setTimeout(checkSession, 200);
        } else {
          doError();
        }
      });
    }

    checkSession();
  }

  // Várjuk meg a Supabase SDK betöltését
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleCallback);
  } else {
    handleCallback();
  }
})();
</script>
</body>
</html>
