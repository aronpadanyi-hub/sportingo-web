<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés... | Sportingo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #0a1628; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { text-align: center; color: white; padding: 20px; }
    .spinner { width: 44px; height: 44px; border: 3px solid rgba(255,255,255,.2); border-top-color: #2dbf7e; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: .95rem; color: rgba(255,255,255,.65); margin-top: 8px; }
    .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 4px; color: white; margin-bottom: 32px; }
    .logo span { color: #2dbf7e; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">SPORTING<span>O</span></div>
  <div class="spinner"></div>
  <div class="msg" id="msg">Bejelentkezés folyamatban...</div>
</div>
<script>
(function() {
  const SUPABASE_URL = 'https://amowwfjxeursokkznmxl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtb3d3Zmp4ZXVyc29ra3pubXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDE4NzQsImV4cCI6MjA4OTkxNzg3NH0.eajpxK96IAF-4XVIv4JALYZ-LqCqXaxU7GIaAE0T5L0';

  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var msgEl = document.getElementById('msg');

  // ── Return URL: URL param > sessionStorage > localStorage > főoldal ──
  // A ?return_to= param storage nélkül is működik (privát mód, ITP).
  // Storage fallback: régi bejelentkezések kompatibilitásához.
  function getReturnUrl() {
    try {
      // 1. URL param (legmegbízhatóbb – cross-origin redirecten is átmegy)
      var urlParam = new URLSearchParams(window.location.search).get('return_to');
      if (urlParam) return urlParam;
      // 2. Hash utáni URL params (implicit flow: #access_token=...&return_to=...)
      // A Supabase hash-t rak elé, de a ?return_to a hash ELŐTT van az URL-ben
      // tehát a fenti URLSearchParams már kiolvasná – ez csak extra biztonság
      var hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      var hashReturn = hashParams.get('return_to');
      if (hashReturn) return hashReturn;
    } catch(e) {}
    // 3. Storage fallback (normál módban)
    try { var ss = sessionStorage.getItem('sp_return_to'); if (ss) return ss; } catch(e) {}
    try { var ls = localStorage.getItem('sp_return_to_fb'); if (ls) return ls; } catch(e) {}
    return 'https://sportingo.hu';
  }

  function doRedirect(url) {
    msgEl.textContent = 'Sikeres bejelentkezés! Visszairányítás...';
    try { sessionStorage.removeItem('sp_return_to'); } catch(e) {}
    try { localStorage.removeItem('sp_return_to_fb'); } catch(e) {}
    setTimeout(function() { window.location.replace(url); }, 700);
  }

  function doError() {
    msgEl.textContent = 'Hiba történt. Visszairányítás a főoldalra...';
    setTimeout(function() { window.location.replace('https://sportingo.hu'); }, 2500);
  }

  function startSessionPoll(returnUrl) {
    var retries = 0, maxRetries = 25;
    function check() {
      sb.auth.getSession().then(function(res) {
        if (res.data && res.data.session) { doRedirect(returnUrl); }
        else if (retries < maxRetries) { retries++; setTimeout(check, 200); }
        else { doError(); }
      }).catch(function() {
        if (retries < maxRetries) { retries++; setTimeout(check, 200); }
        else { doError(); }
      });
    }
    check();
  }

  async function handleCallback() {
    var returnUrl = getReturnUrl();

    // ── 1. Implicit flow: #access_token (Safari) ──
    var hash = window.location.hash;
    if (hash && hash.indexOf('access_token') !== -1) {
      await new Promise(function(r) { setTimeout(r, 600); });
      var res = await sb.auth.getSession();
      if (res.data && res.data.session) { doRedirect(returnUrl); return; }
      startSessionPoll(returnUrl);
      return;
    }

    // ── 2. PKCE flow: ?code=XXXX (Chrome, Firefox, Android) ──
    var code = new URLSearchParams(window.location.search).get('code');
    if (code) {
      try {
        var result = await sb.auth.exchangeCodeForSession(code);
        if (result.error) throw result.error;
        if (result.data && result.data.session) { doRedirect(returnUrl); return; }
      } catch(err) {
        console.error('exchangeCodeForSession hiba:', err);
      }
    }

    // ── 3. Fallback poll ──
    startSessionPoll(returnUrl);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleCallback);
  } else {
    handleCallback();
  }
})();
</script>
</body>
</html>
